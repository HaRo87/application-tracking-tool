version: 3

tasks:
  setup:
    desc: Install project dependencies
    cmds:
      - uv sync
  format:
    desc: Use black to format Python files
    cmds:
      - uv run black --config pyproject.toml src tests
  lint:
    desc: Check code quality
    cmds:
      - uv run black --check src tests
      - uv run ruff check src tests
  test-unit:
    desc: Run unit tests
    cmds:
      - uv run pytest -c pytest.ini --cov-fail-under 80 -m unit tests/
  test-all:
    desc: Run all tests
    cmds:
      - task test-unit
  quality:
    desc: Run all code quality tasks
    cmds:
      - task format
      - task lint
      - task test-all
  coverage:
    desc: Generate coverage report
    cmds:
      - uv run pytest -c pytest.ini -m unit --cov-report=xml
  run-api:
    desc: Run the FastAPI API
    cmds:
      - nohup uv run fastapi dev --host 127.0.0.1 --port 8000 ./src/main.py &
      - xdg-open http://127.0.0.1:8000/docs
  stop-api:
    desc: Stop the FastAPI API
    status: 
      - '["$(pgrep -fl fastapi)" == ""]'
    cmds:
      - pkill fastapi
